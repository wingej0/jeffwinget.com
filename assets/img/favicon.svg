<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80">
  <!-- Ink puddle -->
  <ellipse cx="25" cy="75" rx="14" ry="5" fill="#0D1B2E"/>
  <!-- Puddle sheen -->
  <ellipse cx="20" cy="73" rx="5" ry="2" fill="#1E3D6A" opacity="0.55"/>

  <!-- Right barbs (narrow) -->
  <path d="M46,5 C51,13 51,27 46,41 C42,52 35,58 27,63
           L26,60 C34,55 40,49 44,39 C48,25 47,12 43,7 Z"
        fill="#6A9DC8"/>

  <!-- Left barbs (narrow) -->
  <path d="M46,5 C42,3 37,8 34,18 C31,30 29,47 26,60
           L27,63 C29,50 30,33 33,21 C36,11 41,4 46,5 Z"
        fill="#4A7DAA"/>

  <!-- Spine -->
  <line x1="43" y1="7" x2="26" y2="62"
        stroke="#2C5C8A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Nib — wide, obvious pointed shape dipping into puddle -->
  <path d="M27,60 C22,64 18,70 22,76 L27,69 L32,76 C36,70 32,64 27,60 Z"
        fill="#2C5C8A"/>
  <!-- Nib center slit -->
  <line x1="27" y1="63" x2="27" y2="75"
        stroke="#8FBEE0" stroke-width="0.9" stroke-linecap="round"/>
</svg>
